<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout | Home Page</title>
    <style>
        /*
            1. Grid Layout
               - Columns and Rows 
               - Two Dimensional Layout
               - Simillar to Flex but in one dimension
        */
        .grid-container {
            height: 100vh;
            border: 1px solid;
            display: grid;
            gap: 1rem;
            /* grid-auto-flow: column; */
            grid-template-columns: repeat(3, 1fr);
            /* grid-auto-columns: 300px; */
            grid-template-rows: repeat(3, 1fr);
            /* grid-auto-rows: 300px; */

            /* justify-items: center;
            align-items: center; */

            /* justify-content: center;
            align-content: start; */

        }

        .box {
            background-color: blueviolet;
            color: #fff;
            /* height: 100px;
            width: 100px; */
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
</body>

</html>
